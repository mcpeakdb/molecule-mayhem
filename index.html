<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <title>Molecular Meltdown</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0010;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      /* Stop the page itself from scrolling/bouncing when dragging the on-screen stick on mobile. */
      overscroll-behavior: none;
    }

    canvas {
      display: block;
      image-rendering: pixelated;
      /* Touch input is handled by the game, not the browser — kill pan/zoom gestures on the canvas. */
      touch-action: none;
    }
  </style>
</head>

<body>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
