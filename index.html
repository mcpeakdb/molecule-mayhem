<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <!-- Run chromeless (no URL bar) when added to the home screen — the only way to hide it on iPhone. -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Molecular Meltdown" />
  <meta name="theme-color" content="#0a0010" />
  <title>Molecular Meltdown</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Fill the viewport. Phaser (Scale.FIT + CENTER_BOTH) sizes & centers the canvas inside the body,
       so the body must NOT also center it — a flexbox here double-offsets the letterboxed canvas. */
    html,
    body {
      width: 100%;
      height: 100%;
    }

    body {
      background: #0a0010;
      overflow: hidden;
      /* Dynamic viewport height so the mobile address bar showing/hiding doesn't shrink the game. */
      height: 100dvh;
      /* Stop the page itself from scrolling/bouncing when dragging the on-screen stick on mobile. */
      overscroll-behavior: none;
    }

    canvas {
      display: block;
      image-rendering: pixelated;
      /* Touch input is handled by the game, not the browser — kill pan/zoom gestures on the canvas. */
      touch-action: none;
    }

    /* A landscape (16:9) game is tiny on an upright phone — ask touch users to rotate. Desktop and
       tablets with a mouse are unaffected (pointer: coarse targets touchscreens). */
    #rotate-hint {
      display: none;
    }

    @media (orientation: portrait) and (pointer: coarse) {
      #rotate-hint {
        display: flex;
        position: fixed;
        inset: 0;
        z-index: 10;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.4rem;
        background: #0a0010;
        color: #aaccdd;
        font-family: monospace;
        text-align: center;
        padding: 2rem;
      }

      #rotate-hint .icon {
        font-size: 20vw;
        line-height: 1;
        color: #88ddff;
        animation: rotate-nudge 2.4s ease-in-out infinite;
      }

      #rotate-hint .msg {
        font-size: 5vw;
      }
    }

    @keyframes rotate-nudge {
      0%, 100% {
        transform: rotate(-90deg);
      }
      55%, 75% {
        transform: rotate(0deg);
      }
    }
  </style>
</head>

<body>
  <div id="rotate-hint">
    <div class="icon">⟳</div>
    <div class="msg">Rotate your device to landscape</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
